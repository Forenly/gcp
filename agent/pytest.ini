[pytest]
# Default suite = hermetic unit/integration tests (no network, no browser).
# The AVIP tests drive the local demo-video production pipeline and need
# playwright + a running server; run them explicitly when needed:
#   python -m pytest tests/test_avip_console.py tests/test_avip_real_pipeline.py
addopts = --ignore=tests/test_avip_console.py --ignore=tests/test_avip_real_pipeline.py
testpaths = tests
